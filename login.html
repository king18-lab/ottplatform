<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stackly OTT - Login</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Inter", -apple-system, sans-serif;
        }

        :root {
            --red-primary: #d32f2f;
            --red-dark: #b71c1c;
            --red-light: #ef5350;
            --black-dark: #000000;
            --black-medium: #1a1a1a;
            --black-light: #2d2d2d;
            --white: #ffffff;
            --white-dark: #f5f5f5;
            --gray-light: #e0e0e0;
            --gray-medium: #9e9e9e;
            --border-light: #333333;
        }

        .stklylogin-wrapper {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        .stklylogin-image-panel {
            width: 50%;
            background-image: linear-gradient(rgba(0, 0, 0, 0.8), rgba(211, 47, 47, 0.7)),
                url('kids3.webp');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--white);
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .stklylogin-image-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                45deg,
                rgba(211, 47, 47, 0.1) 0px,
                rgba(211, 47, 47, 0.1) 10px,
                transparent 10px,
                transparent 20px
            );
            pointer-events: none;
        }

        .stklylogin-logo {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .stklylogin-logo span {
            color: var(--red-primary);
        }

        .stklylogin-subtitle {
            font-size: 20px;
            margin-bottom: 30px;
            opacity: 0.9;
            position: relative;
            z-index: 1;
            letter-spacing: 1px;
        }

        .stklylogin-heading {
            font-size: 32px;
            font-weight: 600;
            max-width: 450px;
            line-height: 1.4;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .stklylogin-features {
            display: flex;
            gap: 30px;
            margin-top: 30px;
            position: relative;
            z-index: 1;
        }

        .stklylogin-feature {
            text-align: center;
        }

        .stklylogin-feature i {
            width: 32px;
            height: 32px;
            color: var(--red-primary);
            margin-bottom: 10px;
        }

        .stklylogin-feature p {
            font-size: 14px;
            opacity: 0.9;
        }

        .stklylogin-form-panel {
            width: 50%;
            background-color: var(--black-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 40px;
            position: relative;
        }

        .stklylogin-form-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--red-primary), var(--red-light), var(--red-primary));
        }

        .stklylogin-form-container {
            width: 100%;
            max-width: 450px;
        }

        .stklylogin-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .stklylogin-header h1 {
            font-size: 32px;
            color: var(--white);
            margin-bottom: 8px;
        }

        .stklylogin-header p {
            color: var(--gray-medium);
        }

        .stklylogin-header a {
            color: var(--red-primary) !important;
            font-weight: 600;
            text-decoration: none;
        }

        .stklylogin-header a:hover {
            text-decoration: underline;
        }

        .stklylogin-form-group {
            margin-bottom: 20px;
        }

        .stklylogin-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--white);
        }

        .stklylogin-input,
        .stklylogin-select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--black-light);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            background-color: var(--black-medium);
            color: var(--white);
            transition: all 0.3s;
        }

        .stklylogin-input:focus,
        .stklylogin-select:focus {
            border-color: var(--red-primary);
            box-shadow: 0 0 0 3px rgba(211, 47, 47, 0.2);
        }

        .stklylogin-input::placeholder {
            color: var(--gray-medium);
        }

        .stklylogin-select option {
            background-color: var(--black-medium);
            color: var(--white);
        }

        .stklylogin-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 24px;
            color: var(--gray-medium);
        }

        .stklylogin-meta label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .stklylogin-meta input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--red-primary);
        }

        .stklylogin-meta a {
            color: var(--red-primary);
            text-decoration: none;
            font-weight: 600;
        }

        .stklylogin-meta a:hover {
            text-decoration: underline;
        }

        .stklylogin-btn-submit {
            position: relative;
            width: 100%;
            height: 54px;
            background-color: var(--red-primary);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            overflow: hidden;
            z-index: 1;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stklylogin-btn-submit::before {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0;
            background-color: var(--red-dark);
            z-index: -1;
            transition: height 0.4s ease;
        }

        .stklylogin-btn-submit:hover::before {
            height: 100%;
        }

        .stklylogin-btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(211, 47, 47, 0.4);
        }

        .stklylogin-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 30px 0;
            color: var(--gray-medium);
            font-size: 13px;
        }

        .stklylogin-divider::before,
        .stklylogin-divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid var(--black-light);
        }

        .stklylogin-divider:not(:empty)::before {
            margin-right: 15px;
        }

        .stklylogin-divider:not(:empty)::after {
            margin-left: 15px;
        }

        .stklylogin-social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stklylogin-social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            border: 2px solid var(--black-light);
            border-radius: 8px;
            background: var(--black-medium);
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            gap: 10px;
            color: var(--white);
        }

        .stklylogin-social-btn:hover {
            background: var(--red-primary);
            color: var(--white);
            border-color: var(--red-primary);
            transform: translateY(-2px);
        }

        .stklylogin-social-btn i {
    width: 18px;
    height: 18px;
}

.stklylogin-back-btn {
    margin-top: 20px;
    background: transparent;
    border: 2px solid #3b82f6;
    color: #3b82f6;
    padding: 12px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
    width: 100%;
}

.stklylogin-back-btn:hover {
    background: #3b82f6;
    color: white;
}
        @media (max-width: 992px) {
            .stklylogin-wrapper {
                flex-direction: column;
            }
            .stklylogin-image-panel {
                width: 100%;
                min-height: 300px;
                padding: 30px 20px;
            }
            .stklylogin-form-panel {
                width: 100%;
                padding: 40px 20px;
            }
            .stklylogin-features {
                flex-wrap: wrap;
                justify-content: center;
            }
            .stklylogin-heading {
                font-size: 24px;
            }
        }

        @media (max-width: 480px) {
            .stklylogin-social-grid {
                grid-template-columns: 1fr;
            }
            .stklylogin-logo {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="stklylogin-wrapper">
        <section class="stklylogin-image-panel">
            <div class="stklylogin-logo">STACKLY<span>OTT</span></div>
            <div class="stklylogin-subtitle">Premium Entertainment Platform</div>
            <h2 class="stklylogin-heading">
                Unlimited movies, TV shows, and exclusive content
            </h2>
            
            <div class="stklylogin-features">
                <div class="stklylogin-feature">
                    <i data-lucide="film"></i>
                    <p>1000+ Titles</p>
                </div>
                <div class="stklylogin-feature">
                    <i data-lucide="cpu"></i>
                    <p>4K Streaming</p>
                </div>
                <div class="stklylogin-feature">
                    <i data-lucide="download"></i>
                    <p>Download & Go</p>
                </div>
            </div>
            
            <button type="button" class="stklylogin-back-btn" onclick="window.location.href = 'index.html'">
                BACK TO HOME
            </button>
        </section>

        <section class="stklylogin-form-panel">
            <div class="stklylogin-form-container">
                <div class="stklylogin-header">
                    <h1>Welcome Back</h1>
                    <p>
                        Don't have an account?
                        <a href="getstarted.html">Sign Up</a>
                    </p>
                </div>

                <form id="login-form">
                    <div class="stklylogin-form-group">
                        <label class="stklylogin-label">Login as</label>
                        <select class="stklylogin-select" id="role" required>
                            <option value="Admin">Admin</option>
                            <option value="Subscriber" selected>Subscriber</option>
                        </select>
                    </div>
                    
                    <div class="stklylogin-form-group">
                        <label class="stklylogin-label">Email Address</label>
                        <input
                            type="email"
                            class="stklylogin-input"
                            id="email"
                            placeholder="Enter your email"
                            autocomplete="off"
                            required
                        />
                    </div>
                    
                    <div class="stklylogin-form-group">
                        <label class="stklylogin-label">Password</label>
                        <input
                            type="password"
                            class="stklylogin-input"
                            id="password"
                            placeholder="Enter your password"
                            autocomplete="new-password"
                            required
                        />
                    </div>

                    <div class="stklylogin-meta">
                        <label>
                            <input type="checkbox" /> Remember me
                        </label>
                        <a href="404.html">Forgot password?</a>
                    </div>

                    <button type="submit" class="stklylogin-btn-submit">
                        SIGN IN
                    </button>

                    <div class="stklylogin-divider">Or continue with</div>
                    
                    <div class="stklylogin-social-grid">
                        <button type="button" class="stklylogin-social-btn" onclick="window.location.href = '404.html'">
                            <i data-lucide="facebook"></i> Facebook
                        </button>
                        <button type="button" class="stklylogin-social-btn" onclick="window.location.href = '404.html'">
                            <i data-lucide="chrome"></i> Google
                        </button>
                    </div>
                </form>
            </div>
        </section>
    </div>

    <script>
        lucide.createIcons();
        
        document.getElementById("login-form").addEventListener("submit", (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const role = document.getElementById("role").value;

            const userData = {
                name: role === "Admin" ? "Admin User" : "Subscriber User",
                email: email,
                role: role,
            };

            localStorage.setItem("user", JSON.stringify(userData));

            if (role === "Admin") {
                window.location.href = "admindashboard.html";
            } else {
                window.location.href = "subscriber.html";
            }
        });
        
        window.onload = () => {
            document.getElementById("login-form").reset();
        };
    </script>
</body>
</html>
